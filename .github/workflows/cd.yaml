name: CD — Deploy to Azure Container Apps

# ─────────────────────────────────────────────────────────────
# 🏭 THE FEYNMAN ANALOGY: The Pop-Up Restaurant
#
# AKS is like building a permanent restaurant — expensive.
# Azure Container Apps is like a pop-up stall:
# - Spins up when customers arrive, scales to zero when idle
# - Azure manages all the plumbing (HTTPS, load balancer)
# - Works perfectly on Azure Student accounts!
# ─────────────────────────────────────────────────────────────

on:
  workflow_run:
    workflows: ["DevSecOps Security Pipeline"]
    types: [completed]
    branches: [main]

  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag to deploy (defaults to latest)'
        required: false
        default: 'latest'

env:
  ACR_NAME: euaigovernanceacr
  ACR_LOGIN_SERVER: euaigovernanceacr.azurecr.io
  RESOURCE_GROUP: rg-eu-ai-governance
  LOCATION: germanywestcentral
  CONTAINER_APP_ENV_NAME: cae-eu-ai-governance
  CONTAINER_APP_NAME: ca-eu-ai-governance
  DB_HOST: psql-eu-ai-gov.postgres.database.azure.com

jobs:
  deploy:
    name: 🚀 Deploy to Azure Container Apps
    runs-on: ubuntu-latest

    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    permissions:
      contents: read
      id-token: write

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ──────────────────────────────────────────────────────
      # CRITICAL FIX: Install the containerapp CLI extension.
      #
      # Feynman: The GitHub Actions runner is like a fresh
      # laptop out of the box. Azure CLI is installed, but
      # 'az containerapp' is a plugin that must be added first —
      # like installing a new app on your phone before using it.
      # ──────────────────────────────────────────────────────
      - name: 🔧 Install Azure Container Apps CLI extension
        run: az extension add --name containerapp --upgrade --yes

      - name: 🔐 Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # ──────────────────────────────────────────────────────
      # Register Azure providers — needed for Container Apps.
      # We use `|| true` so this never BLOCKS the pipeline.
      # Student accounts may lack subscription-level permission
      # to register providers, but the providers are often
      # already registered anyway — so this is just a safety net.
      # ──────────────────────────────────────────────────────
      - name: 📋 Register Azure Container Apps providers (soft)
        run: |
          az provider register --namespace Microsoft.App || true
          az provider register --namespace Microsoft.OperationalInsights || true
          # Check registration status (informational only)
          az provider show --namespace Microsoft.App --query "registrationState" -o tsv || true
          az provider show --namespace Microsoft.OperationalInsights --query "registrationState" -o tsv || true

      - name: 🏷️ Resolve image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.image_tag }}"
          else
            TAG="${{ github.event.workflow_run.head_sha }}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Deploying image tag: $TAG"

      # ──────────────────────────────────────────────────────
      # Enable ACR admin so Container Apps can pull the image.
      # We mask the password immediately so it never shows
      # in plain text anywhere in the GitHub Actions logs.
      # ──────────────────────────────────────────────────────
      - name: 🔑 Enable ACR admin and get pull credentials
        id: acr
        run: |
          echo "Enabling ACR admin access..."
          az acr update --name ${{ env.ACR_NAME }} --admin-enabled true

          echo "Fetching ACR credentials..."
          ACR_USERNAME=$(az acr credential show \
            --name ${{ env.ACR_NAME }} \
            --query username -o tsv)
          ACR_PASSWORD=$(az acr credential show \
            --name ${{ env.ACR_NAME }} \
            --query "passwords[0].value" -o tsv)

          if [ -z "$ACR_USERNAME" ] || [ -z "$ACR_PASSWORD" ]; then
            echo "❌ ERROR: Failed to retrieve ACR credentials. Check that AZURE_CREDENTIALS has 'Owner' or 'Contributor' role on the ACR resource."
            exit 1
          fi

          echo "username=$ACR_USERNAME" >> $GITHUB_OUTPUT
          echo "::add-mask::$ACR_PASSWORD"
          echo "password=$ACR_PASSWORD" >> $GITHUB_OUTPUT
          echo "✅ ACR credentials retrieved successfully."

      # ──────────────────────────────────────────────────────
      # Create the Container Apps Environment if it doesn't
      # exist yet. Safe to skip if already provisioned.
      # ──────────────────────────────────────────────────────
      - name: 🏗️ Create Container Apps Environment (if not exists)
        run: |
          if az containerapp env show \
               --name ${{ env.CONTAINER_APP_ENV_NAME }} \
               --resource-group ${{ env.RESOURCE_GROUP }} \
               --output none 2>/dev/null; then
            echo "✅ Environment already exists — skipping."
          else
            echo "🔨 Creating Container Apps Environment..."
            az containerapp env create \
              --name ${{ env.CONTAINER_APP_ENV_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --location ${{ env.LOCATION }}
            echo "✅ Environment ready."
          fi

      # ──────────────────────────────────────────────────────
      # Create or update the Container App.
      # First run  → full create with env vars and secrets
      # Later runs → image-only update (fast rolling deploy)
      # ──────────────────────────────────────────────────────
      - name: 🐳 Create or Update Container App
        run: |
          IMAGE="${{ env.ACR_LOGIN_SERVER }}/eu-ai-governance:${{ steps.tag.outputs.tag }}"

          if az containerapp show \
               --name ${{ env.CONTAINER_APP_NAME }} \
               --resource-group ${{ env.RESOURCE_GROUP }} \
               --output none 2>/dev/null; then

            echo "🔄 Updating existing Container App image to: $IMAGE"
            az containerapp update \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --image "$IMAGE"

          else
            echo "🆕 Creating new Container App..."
            az containerapp create \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --environment ${{ env.CONTAINER_APP_ENV_NAME }} \
              --image "$IMAGE" \
              --registry-server ${{ env.ACR_LOGIN_SERVER }} \
              --registry-username "${{ steps.acr.outputs.username }}" \
              --registry-password "${{ steps.acr.outputs.password }}" \
              --target-port 8000 \
              --ingress external \
              --min-replicas 1 \
              --max-replicas 3 \
              --cpu 0.5 \
              --memory 1.0Gi \
              --env-vars \
                "DB_HOST=${{ env.DB_HOST }}" \
                "DB_USER=pgadmin" \
                "DB_NAME=euaigovernance" \
                "DB_PORT=5432" \
                "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" \
                "JWT_SECRET=${{ secrets.JWT_SECRET }}" \
                "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}"
            echo "✅ Container App created."
          fi

      - name: 🌐 Print live application URL
        run: |
          FQDN=$(az containerapp show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" \
            --output tsv)
          echo "============================================"
          echo "  ✅ DEPLOYMENT COMPLETE!"
          echo "  🌐 App URL:  https://$FQDN"
          echo "  📄 Swagger:  https://$FQDN/api/v1/docs"
          echo "  📊 V2 Docs:  https://$FQDN/api/v2/docs"
          echo "============================================"
