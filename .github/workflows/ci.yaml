name: DevSecOps Security Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  ACR_LOGIN_SERVER: euaigovernanceacr.azurecr.io

jobs:

  sast:
    name: SAST - Static Code Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Bandit
        run: pip install bandit
      - name: Run Bandit
        run: bandit -r src/ -f json -o bandit-report.json || true
      - name: Install Semgrep
        run: pip install semgrep
      - name: Run Semgrep
        run: semgrep --config=auto src/ --json --output semgrep-report.json || true
      - name: Upload SAST reports
        uses: actions/upload-artifact@v4
        with:
          name: sast-reports
          path: |
            bandit-report.json
            semgrep-report.json

  sca:
    name: SCA - Dependency Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Run pip-audit
        run: pip-audit --output pip-audit-report.json --format json || true
      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
      - name: Generate SBOM with Syft
        run: syft . -o json > sbom.json
      - name: Install Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
      - name: Scan SBOM with Grype
        run: grype sbom:./sbom.json -o json > grype-report.json || true
      - name: Upload SCA reports
        uses: actions/upload-artifact@v4
        with:
          name: sca-reports
          path: |
            pip-audit-report.json
            sbom.json
            grype-report.json

  test:
    name: Unit and Integration Tests
    runs-on: ubuntu-latest
    needs: [sast, sca]
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      DB_HOST: localhost
      DB_USER: test
      DB_PASSWORD: test
      DB_NAME: test
      DB_PORT: 5432
      steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run database migrations
        run: alembic upgrade head
      - name: Run tests
        run: python -m pytest tests/ -v --tb=short