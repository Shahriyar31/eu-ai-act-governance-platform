name: DevSecOps Security Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  ACR_LOGIN_SERVER: euaigovernanceacr.azurecr.io

jobs:

  # SAST - Static Application Security Testing
  # Scans source code before it runs
  sast:
    name: SAST - Static Code Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit
        run: bandit -r src/ -f json -o bandit-report.json || true

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep
        run: semgrep --config=auto src/ --json --output semgrep-report.json || true

      - name: Upload SAST reports
        uses: actions/upload-artifact@v4
        with:
          name: sast-reports
          path: |
            bandit-report.json
            semgrep-report.json

  # SCA - Software Composition Analysis
  # Scans dependencies and generates SBOM
  sca:
    name: SCA - Dependency Scanning
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        run: pip-audit --output pip-audit-report.json --format json || true

      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Generate SBOM with Syft
        run: syft . -o json > sbom.json

      - name: Install Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Scan SBOM with Grype
        run: grype sbom:./sbom.json -o json > grype-report.json || true

      - name: Upload SCA reports
        uses: actions/upload-artifact@v4
        with:
          name: sca-reports
          path: |
            pip-audit-report.json
            sbom.json
            grype-report.json

  # Container Security Scanning
  # Builds Docker image and scans it with Trivy
  container-scan:
    name: Container Security Scan
    runs-on: ubuntu-latest
    needs: [sast, sca]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t eu-ai-governance:${{ github.sha }} -f docker/Dockerfile .

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Scan image with Trivy
        run: |
          trivy image \
           --exit-code 1 \
           --severity CRITICAL \
           --ignore-unfixed \
           --format json \
           --output trivy-report.json \ 
           eu-ai-governance:${{ github.sha }}

      - name: Upload Trivy report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-report
          path: trivy-report.json

  # Push to Azure Container Registry
  # Only runs if all security scans pass
  push-to-acr:
    name: Push Image to ACR
    runs-on: ubuntu-latest
    needs: [container-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name euaigovernanceacr

      - name: Build and push image
        run: |
          docker build -t ${{ env.ACR_LOGIN_SERVER }}/eu-ai-governance:${{ github.sha }} \
            -f docker/Dockerfile .
          docker push ${{ env.ACR_LOGIN_SERVER }}/eu-ai-governance:${{ github.sha }}
          docker tag ${{ env.ACR_LOGIN_SERVER }}/eu-ai-governance:${{ github.sha }} \
            ${{ env.ACR_LOGIN_SERVER }}/eu-ai-governance:latest
          docker push ${{ env.ACR_LOGIN_SERVER }}/eu-ai-governance:latest