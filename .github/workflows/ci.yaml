name: DevSecOps Security Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  ACR_LOGIN_SERVER: euaigovernanceacr.azurecr.io

jobs:

  sast:
    name: SAST - Static Code Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Bandit
        run: pip install bandit
      - name: Run Bandit
        run: bandit -r src/ -f json -o bandit-report.json || true
      - name: Install Semgrep
        run: pip install semgrep
      - name: Run Semgrep
        run: semgrep --config=auto src/ --json --output semgrep-report.json || true
      - name: Upload SAST reports
        uses: actions/upload-artifact@v4
        with:
          name: sast-reports
          path: |
            bandit-report.json
            semgrep-report.json

  sca:
    name: SCA - Dependency Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Run pip-audit
        run: pip-audit --output pip-audit-report.json --format json || true
      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
      - name: Generate SBOM with Syft
        run: syft . -o json > sbom.json
      - name: Install Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
      - name: Scan SBOM with Grype
        run: grype sbom:./sbom.json -o json > grype-report.json || true
      - name: Upload SCA reports
        uses: actions/upload-artifact@v4
        with:
          name: sca-reports
          path: |
            pip-audit-report.json
            sbom.json
            grype-report.json

  test:
    name: Unit and Integration Tests
    runs-on: ubuntu-latest
    needs: [sast, sca]
    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      DB_HOST: localhost
      DB_USER: test
      DB_PASSWORD: test
      DB_NAME: test
      DB_PORT: 5432
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  container-scan:
    name: Container Security Scan
    runs-on: ubuntu-latest
    needs: [sast, sca, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build React frontend
        working-directory: frontend
        run: npm ci && npm run build
      - name: Build Docker image
        run: docker build -t eu-ai-governance:${{ github.sha }} -f docker/Dockerfile .
      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
      - name: Scan image with Trivy
        run: |
          trivy image \
            --exit-code 0 \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --format json \
            --output trivy-report.json \
            eu-ai-governance:${{ github.sha }}
      - name: Upload Trivy report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-report
          path: trivy-report.json

  push-to-acr:
    name: Push Image to ACR
    runs-on: ubuntu-latest
    needs: [container-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build React frontend
        working-directory: frontend
        run: npm ci && npm run build
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Login to ACR
        run: az acr login --name euaigovernanceacr
      - name: Build and push image to ACR
        run: |
          docker build \
            -t ${{ env.ACR_LOGIN_SERVER }}/eu-ai-governance:${{ github.sha }} \
            -t ${{ env.ACR_LOGIN_SERVER }}/eu-ai-governance:latest \
            -f docker/Dockerfile .
          docker push ${{ env.ACR_LOGIN_SERVER }}/eu-ai-governance:${{ github.sha }}
          docker push ${{ env.ACR_LOGIN_SERVER }}/eu-ai-governance:latest

  deploy:
    name: Deploy to Azure Container Apps
    runs-on: ubuntu-latest
    needs: [push-to-acr]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Deploy to Container Apps
        run: |
          az containerapp update \
            --name ca-eu-ai-governance \
            --resource-group rg-eu-ai-governance \
            --image ${{ env.ACR_LOGIN_SERVER }}/eu-ai-governance:${{ github.sha }}
      - name: Print live URL
        run: |
          echo "Deployed: https://eu-ai-governance.salmonocean-15ddaf55.germanywestcentral.azurecontainerapps.io"
