apiVersion: apps/v1
kind: Deployment
metadata:
  name: eu-ai-governance
  labels:
    app: eu-ai-governance
spec:
  replicas: 2
  selector:
    matchLabels:
      app: eu-ai-governance
  template:
    metadata:
      labels:
        app: eu-ai-governance
    spec:
      containers:
      - name: api
        image: euaigovernanceacr.azurecr.io/eu-ai-governance:latest
        ports:
        - containerPort: 8000
        env:
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: host
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: user
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: password
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: name
        - name: DB_PORT
          value: "5432"
        - name: GROQ_API_KEY
          valueFrom:
            secretKeyRef:
              name: api-credentials
              key: groq_key
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: eu-ai-governance-service
spec:
  selector:
    app: eu-ai-governance
  ports:
  - port: 80
    targetPort: 8000
  type: LoadBalancer