version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: eu-ai-gov-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-pgadmin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-Shahriyar@1998#}
      POSTGRES_DB: ${DB_NAME:-euaigovernance}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-pgadmin} -d ${DB_NAME:-euaigovernance}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: eu-ai-gov-api
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DB_HOST=db  # Override host in compose to point to local db service
      - DB_PORT=5432
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./keys:/app/keys
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: eu-ai-gov-prometheus
    restart: always
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - api

  grafana:
    image: grafana/grafana:10.0.0
    container_name: eu-ai-gov-grafana
    restart: always
    volumes:
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  pgdata:
  prometheus-data:
  grafana-data:
